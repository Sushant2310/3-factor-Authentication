<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="csrf-token" content="{{ csrf_token }}"/>
    <title>Face Upload Fallback</title>
    <link rel="stylesheet" href="/static/theme.css"/>
</head>
<body class="app-shell">
    <main class="app-page">
        <section class="panel-card" style="max-width: 720px; margin: 0 auto;">
            <div class="panel-inner">
                <div class="title-block">
                    <h1>Upload a Face Image</h1>
                    <p>Use this fallback when webcam capture is unavailable. Upload a clear, front-facing image with your full face visible.</p>
                </div>

                <form method="post" enctype="multipart/form-data" class="spacer-top">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
                    <div class="field">
                        <label for="file">Select a face image</label>
                        <input type="file" name="file" id="file" accept="image/png, image/jpeg" required>
                    </div>
                    <div class="button-row spacer-top">
                        <button type="submit" class="btn btn-primary">Upload & Register</button>
                        <a href="/face_register" class="btn btn-soft">Back to Webcam Registration</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
