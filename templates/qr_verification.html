<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Verification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; margin-bottom: 1rem; }
        img { max-width: 100%; border-radius: 10px; margin: 1rem 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4facfe; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #3ba0e8; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center; }
        .danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .instructions { font-size: 14px; color: #666; margin: 1rem 0; }
        .error { border-color: #f56565; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Scan QR for {{ username }}</h1>
        
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}" role="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <img src="{{ qr_path }}" alt="QR Code for Verification" id="qrImage">
        <p class="instructions">Scan with your phone camera or paste the text below.</p>
        
        <form method="POST" action="{{ url_for('qr_verify') }}" id="qrForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
            <input type="text" name="qr_payload" placeholder="Paste QR text here (e.g., qr:username:token)" required aria-label="QR Payload" id="qrInput">
            <button type="submit">Verify QR</button>
        </form>
    </div>

    <script>
        // Simple QR payload validation (basic parse)
        document.getElementById('qrForm').addEventListener('submit', function(e) {
            const payload = document.getElementById('qrInput').value.trim();
            if (!payload || !payload.startsWith('qr:')) {
                e.preventDefault();
                alert('Invalid QR format! Must start with "qr:username:token"');
                document.getElementById('qrInput').classList.add('error');
                return false;
            }
            document.getElementById('qrInput').classList.remove('error');
        });

        // Optional: Simulate scan (copy to clipboard on click)
        document.getElementById('qrImage').addEventListener('click', function() {
            const tempInput = document.createElement('input');
            tempInput.value = 'qr:{{ username }}:sample_token_123';  // Mock; real from server if passed
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            alert('Mock QR text copied! Paste below.');
        });
    </script>
</body>
</html>
