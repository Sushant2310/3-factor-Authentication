<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="csrf-token" content="{{ csrf_token }}"/>
  <title>Face Authentication</title>
  <link rel="stylesheet" href="/static/theme.css"/>
  <style>
    .camera-frame { position: relative; }
    .camera-frame video,
    .camera-frame canvas {
      width: 100%;
      min-height: 420px;
      object-fit: cover;
      background: #0f172a;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .face-guide {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 360px;
      border: 3px dashed rgba(255,255,255,0.88);
      border-radius: 45% 45% 42% 42% / 38% 38% 48% 48%;
      pointer-events: none;
    }
  </style>
</head>
<body class="app-shell">
  <main class="app-page">
    <section class="app-grid">
      <article class="hero-card">
        <div class="hero-inner">
          <div class="eyebrow">Biometric Login</div>
          <h1 class="hero-title">Verify your face.</h1>
          <p class="hero-copy">The capture button is only enabled when the app can see a single, full, centered face.</p>
        </div>
      </article>

      <section class="panel-card">
        <div class="panel-inner">
          <div class="title-block">
            <h2>Face Authentication</h2>
            <p>Align your face in the guide and capture when the status turns ready.</p>
          </div>

          <div id="statusMessage" class="status-banner warning spacer-top">Checking camera…</div>

          <div class="media-card spacer-top camera-frame">
            <video id="videoElement" autoplay playsinline></video>
            <div class="face-guide"></div>
            <canvas id="canvas" style="display:none;"></canvas>
          </div>

          <div class="button-row spacer-top">
            <button id="captureBtn" class="btn btn-primary" disabled>Capture</button>
            <button id="retryBtn" class="btn btn-soft" style="display:none;">Retry</button>
            <button id="submitBtn" class="btn btn-secondary" style="display:none;">Submit</button>
          </div>
        </div>
      </section>
    </section>
  </main>
  <script src="/static/app.js"></script>
  <script>
      const video = document.getElementById('videoElement');
      const canvas = document.getElementById('canvas');
      const captureBtn = document.getElementById('captureBtn');
      const retryBtn = document.getElementById('retryBtn');
      const submitBtn = document.getElementById('submitBtn');
      const statusMessage = document.getElementById('statusMessage');
      let stream;
      let faceCheckInterval = null;

      function setStatus(text, kind = 'warning') {
          statusMessage.textContent = text;
          statusMessage.className = 'status-banner spacer-top ' + kind;
      }

      async function startVideo() {
          try {
              stream = await navigator.mediaDevices.getUserMedia({
                  video: {
                      width: { ideal: 1280 },
                      height: { ideal: 720 },
                      facingMode: "user"
                  }
              });
              video.srcObject = stream;
              setStatus('Checking that your full face is visible…', 'warning');
              startFaceDetection();
          } catch (err) {
              setStatus('Could not access webcam. Please check permissions.', 'error');
          }
      }

      function startFaceDetection() {
          if (faceCheckInterval) {
              clearInterval(faceCheckInterval);
          }

          faceCheckInterval = setInterval(async () => {
              if (video.paused || video.ended || !video.videoWidth || canvas.style.display === 'block') {
                  return;
              }

              const tempCanvas = document.createElement('canvas');
              tempCanvas.width = video.videoWidth;
              tempCanvas.height = video.videoHeight;
              tempCanvas.getContext('2d').drawImage(video, 0, 0);

              const formData = new FormData();
              formData.append('image_data', tempCanvas.toDataURL('image/jpeg'));

              try {
                  const response = await window.threeFA.formFetch('/check_face', formData);
                  const data = await response.json();
                  if (data.face_detected) {
                      setStatus(data.message || 'Face detected. You can capture now.', 'success');
                      captureBtn.disabled = false;
                  } else {
                      setStatus(data.message || 'Adjust your position.', 'warning');
                      captureBtn.disabled = true;
                  }
              } catch (error) {
                  setStatus('Face detection unavailable. Please try again.', 'error');
                  captureBtn.disabled = true;
              }
          }, 1200);
      }

      function stopVideo() {
          if (faceCheckInterval) {
              clearInterval(faceCheckInterval);
              faceCheckInterval = null;
          }
          if (stream) {
              stream.getTracks().forEach(track => track.stop());
          }
      }

      captureBtn.onclick = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);

          video.style.display = 'none';
          canvas.style.display = 'block';
          captureBtn.style.display = 'none';
          retryBtn.style.display = 'inline-flex';
          submitBtn.style.display = 'inline-flex';
      };

      retryBtn.onclick = () => {
          video.style.display = 'block';
          canvas.style.display = 'none';
          captureBtn.style.display = 'inline-flex';
          retryBtn.style.display = 'none';
          submitBtn.style.display = 'none';
      };

      submitBtn.onclick = async () => {
          const formData = new FormData();
          formData.append('image_data', canvas.toDataURL('image/jpeg'));

          try {
              const response = await window.threeFA.formFetch('/verify_face', formData);
              const result = await response.json();
              if (result.success) {
                  window.location.href = '/dashboard';
              } else {
                  setStatus(result.message || result.detail || 'Face verification failed.', 'error');
                  retryBtn.click();
              }
          } catch (error) {
              setStatus('Error verifying face. Please try again.', 'error');
              retryBtn.click();
          }
      };

      startVideo();
      window.addEventListener('beforeunload', stopVideo);
  </script>
</body>
</html>
