<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="csrf-token" content="{{ csrf_token }}"/>
  <title>Phone Face Upload</title>
  <link rel="stylesheet" href="/static/theme.css"/>
</head>
<body class="app-shell">
  <main class="app-page">
    <section class="panel-card">
      <div class="panel-inner">
        <div class="title-block">
          <h1>Upload face photo</h1>
          <p>Take a front-facing photo in good light, then upload it to complete registration from your phone.</p>
        </div>

        {% if error %}
          <div class="status-banner spacer-top error">{{ error }}</div>
        {% endif %}

        {% if success %}
          <div class="status-banner spacer-top success">Face registered successfully. OTP: {{ otp }}</div>
        {% else %}
          <div class="soft-panel tile spacer-top">
            <div class="metric-label">OTP for this scan</div>
            <div class="metric-value">{{ otp }}</div>
          </div>

          <form method="post" enctype="multipart/form-data" class="spacer-top">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
            <div class="field">
              <label for="image">Select photo</label>
              <input id="image" type="file" name="image" accept="image/*" required />
            </div>
            <div class="button-row spacer-top">
              <button type="submit" class="btn btn-primary">Upload & Register</button>
            </div>
          </form>
        {% endif %}
      </div>
    </section>
  </main>
</body>
</html>
