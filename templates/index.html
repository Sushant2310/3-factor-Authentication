<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3FA Demo - Welcome</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
    .container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px #0001; padding: 32px 24px; text-align: center; }
    h1 { color: #d32f2f; margin-bottom: 8px; }
    p { color: #444; margin-bottom: 32px; }
    .login-btn { display: block; width: 100%; margin: 12px 0; padding: 14px; font-size: 1.1em; border: none; border-radius: 6px; background: #d32f2f; color: #fff; cursor: pointer; transition: background 0.2s; }
    .login-btn:hover { background: #b71c1c; }
    .alt-btn { background: #1976d2; }
    .alt-btn:hover { background: #0d47a1; }
    .face-btn { background: #388e3c; }
    .face-btn:hover { background: #1b5e20; }
    .footer { margin-top: 32px; color: #888; font-size: 0.95em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to 3FA Demo</h1>
    <p>Choose your login method:</p>
    <form action="/login" method="get">
      <button class="login-btn" type="submit">Password Login</button>
    </form>
    <form action="/totp_login" method="get">
      <button class="login-btn alt-btn" type="submit">TOTP Login</button>
    </form>
    <form action="/face_login" method="get">
      <button class="login-btn face-btn" type="submit">Face Recognition Login</button>
    </form>
  </div>
  <div class="footer">&copy; 2025 3FA Demo | Secure, Simple, Modern</div>
</body>
</html>
